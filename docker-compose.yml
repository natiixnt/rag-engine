services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag_engine
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_engine"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

  rag-engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RAG_PG_URL=postgresql://rag:rag@pgvector:5432/rag_engine
      - RAG_MODEL_PATH=/models/cross-encoder-v2.onnx
      - RAG_LOG_LEVEL=info
      - RUST_LOG=info
    volumes:
      - ./models:/models:ro
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      pgvector:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"

volumes:
  pgdata:
